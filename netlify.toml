[build]
  publish = "."
  # No build step needed — pure static HTML

# Custom Netlify site name: sy-recruitment
# When deploying via Netlify UI, set site name to "sy-recruitment"
# (Site Settings → General → Site name)

[[headers]]
  for = "/*"
  [headers.values]
    # Clickjacking prevention
    X-Frame-Options = "DENY"

    # MIME-type sniffing prevention
    X-Content-Type-Options = "nosniff"

    # Restrict referrer info sent to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Permissions Policy — disable sensors/features the form doesn't need
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"

    # Content Security Policy (M3 security fix)
    # - script-src: allows inline JS, cdnjs (Three.js/GSAP), unpkg (Phosphor icons)
    # - style-src: allows inline CSS, Google Fonts, and unpkg (Phosphor icons CSS)
    # - connect-src: Google Apps Script endpoint and its usercontent redirects
    # - font-src: Google Fonts and unpkg font files
    # - img-src: local images + base64 data URIs
    # - frame-ancestors 'none': blocks embedding in iframes (stronger than X-Frame-Options)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src https://fonts.gstatic.com https://unpkg.com data:; img-src 'self' data:; connect-src https://script.google.com https://script.googleusercontent.com; frame-ancestors 'none'; base-uri 'self'; form-action 'none'"
